<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الشات - شات عربي</title>
  <link rel="icon" href="/favicon.ico.png" type="image/png">
  <link rel="apple-touch-icon" href="/favicon.ico.png">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Moh Chat",
    "url": "https://chat-arabi-1.onrender.com",
    "publisher": {
      "@type": "Organization",
      "logo": "https://chat-arabi-1.onrender.com/favicon.ico.png"
    }
  }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0f1e;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* header */
    header {
      background: #0f172a;
      padding: 12px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #334155;
      flex-wrap: wrap;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .header-left h1 {
      font-size: 1.5rem;
      color: #3b82f6;
    }
    .header-icons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .icon-btn {
      background: #1e293b;
      border: none;
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
      position: relative;
    }
    .icon-btn:hover {
      background: #3b82f6;
    }
    .badge {
      background: #ef4444;
      border-radius: 20px;
      padding: 2px 6px;
      font-size: 0.7rem;
      position: absolute;
      top: -5px;
      right: -5px;
    }
    #avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid #3b82f6;
    }
    .logout-btn {
      background: #ef4444;
      border: none;
      color: white;
      padding: 8px 15px;
      border-radius: 8px;
      cursor: pointer;
    }

    /* main chat area */
    .chat-main {
      display: flex;
      flex: 1;
      overflow: hidden;
      padding: 15px;
      gap: 15px;
    }
    #chatWindow {
      flex: 1;
      background: #0f172a;
      border-radius: 16px;
      overflow-y: auto;
      padding: 20px;
    }
    #usersPanel {
      width: 260px;
      background: #0f172a;
      border-radius: 16px;
      border: 1px solid #334155;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .users-header-simple {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 15px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
    }
    .users-list-simple {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }
    .user-item-simple {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
      background: #1e293b;
      margin-bottom: 8px;
    }
    .user-item-simple:hover {
      background: #334155;
    }
    .user-item-simple img {
      width: 42px;
      height: 42px;
      border-radius: 50%;
    }
    .user-name-simple {
      font-weight: bold;
    }

    /* message form */
    #messageForm {
      display: flex;
      gap: 10px;
      padding: 15px;
      background: #0f172a;
      border-top: 1px solid #334155;
    }
    #messageInput {
      flex: 1;
      padding: 12px;
      border-radius: 30px;
      border: none;
      background: #1e293b;
      color: white;
    }
    #messageForm button {
      background: #3b82f6;
      border: none;
      color: white;
      padding: 0 20px;
      border-radius: 30px;
      cursor: pointer;
    }
    .emoji-btn {
      background: #334155;
      border: none;
      color: white;
      width: 45px;
      border-radius: 30px;
      cursor: pointer;
    }

    /* ============================================= */
    /*  البروفيل الجديد - الشكل المستطيل مع صورة مربعة  */
    /* ============================================= */
    #myProfilePanel {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 500px;
      max-width: 90%;
      background: #0f172a;
      border-radius: 24px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.6);
      z-index: 2000;
      border: 1px solid #334155;
      overflow: hidden;
      direction: rtl;
    }

    /* صورة الخلفية (الغطاء) الطويلة */
    .profile-cover-new {
      height: 150px;
      background-size: cover;
      background-position: center;
      position: relative;
    }
    .cover-overlay-new {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: 0.3s;
    }
    .profile-cover-new:hover .cover-overlay-new {
      opacity: 1;
    }
    .change-cover-new {
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 0.8rem;
      cursor: pointer;
    }

    /* صورة البروفيل مربعة - أهم نقطة */
    .avatar-square {
      display: flex;
      justify-content: center;
      margin-top: -50px;
      position: relative;
      z-index: 2;
    }
    #myProfileAvatar {
      width: 100px;
      height: 100px;
      border-radius: 16px;
      /* مربعة  */
      object-fit: cover;
      border: 4px solid #0f172a;
      background: #1e293b;
    }
    .edit-avatar-square {
      position: absolute;
      bottom: 5px;
      right: calc(50% - 60px);
      background: #3b82f6;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 2px solid #0f172a;
    }

    /* اسم المستخدم */
    .profile-username-new {
      text-align: center;
      margin: 15px 0 5px;
      font-size: 1.5rem;
      font-weight: bold;
    }

    /* تبويبات منضمة */
    .profile-tabs-new {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      padding: 15px 20px;
      border-bottom: 1px solid #334155;
      background: #0a0f1e;
    }
    .profile-tab-new {
      background: #1e293b;
      border: none;
      padding: 8px 16px;
      border-radius: 30px;
      color: #cbd5e1;
      cursor: pointer;
      transition: 0.2s;
    }
    .profile-tab-new.active {
      background: #3b82f6;
      color: white;
    }
    .profile-tab-new.highlight {
      background: linear-gradient(90deg, #8b5cf6, #d946ef);
      color: white;
    }

    /* محتوى التبويبات */
    .profile-content-new {
      padding: 20px;
      max-height: 400px;
      overflow-y: auto;
    }
    .tab-pane-new {
      display: none;
    }
    .tab-pane-new.active {
      display: block;
    }

    /* شبكة المعلومات */
    .info-grid-new {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .info-card-new {
      background: #1e293b;
      padding: 12px;
      border-radius: 12px;
    }
    .info-card-new .label {
      color: #94a3b8;
      font-size: 0.8rem;
    }

    /* أزرار منضمة */
    .action-buttons-new {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .action-btn-new {
      flex: 1;
      background: #3b82f6;
      border: none;
      color: white;
      padding: 10px;
      border-radius: 12px;
      cursor: pointer;
      text-align: center;
    }
    .action-btn-new.danger {
      background: #ef4444;
    }

    .close-panel {
      cursor: pointer;
      font-size: 1.8rem;
    }

    .hidden {
      display: none;
    }
    .emoji-picker {
      position: absolute;
      bottom: 70px;
      left: 20px;
      background: #1e293b;
      border-radius: 16px;
      padding: 10px;
      width: 250px;
      z-index: 999;
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>شات عربي</h1>
    <div class="header-icons">
      <button class="icon-btn" id="privateMsgBtn"><i class="fas fa-envelope"></i></button>
      <button class="icon-btn" id="friendReqBtn"><i class="fas fa-user-plus"></i></button>
      <button class="icon-btn" id="notificationsBtn"><i class="fas fa-bell"></i></button>
      <button class="icon-btn" id="reportsBtn"><i class="fas fa-flag"></i></button>
      <button class="icon-btn" id="shopBtn"><i class="fas fa-shopping-cart"></i></button>
      <button class="icon-btn" id="myLevelBtn"><i class="fas fa-star"></i></button>
    </div>
  </div>
  <div style="display: flex; align-items: center; gap: 15px;">
    <div id="profileBtn"><img id="avatar" src="https://via.placeholder.com/40" alt="بروفايل"></div>
    <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> خروج</button>
  </div>
</header>

<div class="chat-main">
  <div id="chatWindow"></div>
  <div id="usersPanel">
    <div class="users-header-simple"><h3><i class="fas fa-users"></i> المتصلون</h3></div>
    <div id="usersList" class="users-list-simple"></div>
  </div>
</div>

<form id="messageForm">
  <input type="text" id="messageInput" placeholder="اكتب رسالتك..." autocomplete="off">
  <button type="button" id="imageUploadBtn" class="emoji-btn" onclick="document.getElementById('imageInput').click();"><i class="fas fa-image"></i></button>
  <input type="file" id="imageInput" accept="image/*" style="display:none;">
  <button type="button" id="emojiBtn" class="emoji-btn">😊</button>
  <button type="submit">إرسال</button>
</form>
<div id="emojiPicker" class="emoji-picker hidden"></div>

<!-- ============= البروفيل الجديد بالشكل المستطيل والمربع ============= -->
<div id="myProfilePanel">
  <div style="display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #1e293b;">
    <h3>بروفايلك</h3>
    <span id="closeMyProfile" class="close-panel">×</span>
  </div>

  <!-- خلفية طويلة -->
  <div class="profile-cover-new" id="myCoverPhoto" style="background-image: url('https://via.placeholder.com/800x200/1e293b/ffffff?text=خلفيتك')">
    <div class="cover-overlay-new">
      <label for="coverUpload" class="change-cover-new"><i class="fas fa-camera"></i> تغيير الخلفية</label>
      <input type="file" id="coverUpload" accept="image/*" hidden>
    </div>
  </div>

  <!-- صورة مربعة -->
  <div class="avatar-square">
    <img id="myProfileAvatar" src="https://via.placeholder.com/100" alt="صورة شخصية">
    <label for="avatarUpload" class="edit-avatar-square"><i class="fas fa-camera"></i></label>
    <input type="file" id="avatarUpload" accept="image/*" hidden>
  </div>

  <!-- الاسم ييجي تلقائي من الحساب -->
  <div class="profile-username-new" id="myProfileUsername">MOHAMED-DZ</div>

  <!-- تبويبات منضمة -->
  <div class="profile-tabs-new">
    <button class="profile-tab-new active" data-tab="info">معلوماتي</button>
    <button class="profile-tab-new" data-tab="friends">الأصدقاء</button>
    <button class="profile-tab-new" data-tab="features" class="highlight">المميزات</button>
    <button class="profile-tab-new" data-tab="account">الحساب</button>
  </div>

  <div class="profile-content-new">
    <div id="tab-info" class="tab-pane-new active">
      <div class="info-grid-new">
        <div class="info-card-new"><span class="label">الاسم:</span><br><span id="infoUsername">MOHAMED-DZ</span></div>
        <div class="info-card-new"><span class="label">الجنس:</span><br>ذكر</div>
        <div class="info-card-new"><span class="label">البلد:</span><br>الجزائر</div>
        <div class="info-card-new"><span class="label">الحالة:</span><br>متصل</div>
      </div>
      <div class="action-buttons-new">
        <button class="action-btn-new">تعديل</button>
        <button class="action-btn-new danger">حذف الحساب</button>
      </div>
    </div>
    <div id="tab-friends" class="tab-pane-new">قائمة الأصدقاء ستظهر هنا...</div>
    <div id="tab-features" class="tab-pane-new">
      <h4>إطار الصورة</h4>
      <div style="display: flex; gap: 10px; margin-bottom: 15px;">
        <div onclick="updateAvatarBorder('4px solid red')" style="width: 40px; height: 40px; background: red; border-radius: 8px; cursor: pointer;"></div>
        <div onclick="updateAvatarBorder('4px solid #3b82f6')" style="width: 40px; height: 40px; background: #3b82f6; border-radius: 8px; cursor: pointer;"></div>
        <div onclick="updateAvatarBorder('4px solid gold')" style="width: 40px; height: 40px; background: gold; border-radius: 8px; cursor: pointer;"></div>
      </div>
      <button onclick="saveBorderSelection()" style="background:#3b82f6; border:none; padding:8px; border-radius:12px; color:white;">حفظ الإطار</button>
    </div>
    <div id="tab-account" class="tab-pane-new">إعدادات الحساب...</div>
  </div>
</div>

<script>
  // محاكاة الاسم ييجي من الحساب المسجل
  const loggedInUsername = "MOHAMED-DZ"; // هذا يجيب من السيرفر تلقائيًا في الحقيقة
  document.getElementById('myProfileUsername').innerText = loggedInUsername;
  document.getElementById('infoUsername').innerText = loggedInUsername;

  // إظهار وإخفاء البروفيل
  document.getElementById('profileBtn')?.addEventListener('click', () => {
    document.getElementById('myProfilePanel').style.display = 'block';
  });
  document.getElementById('closeMyProfile')?.addEventListener('click', () => {
    document.getElementById('myProfilePanel').style.display = 'none';
  });

  // التبويبات
  document.querySelectorAll('.profile-tab-new').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.profile-tab-new').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const tabId = tab.dataset.tab;
      document.querySelectorAll('.tab-pane-new').forEach(pane => pane.classList.remove('active'));
      document.getElementById(`tab-${tabId}`).classList.add('active');
    });
  });

  // رفع صورة الخلفية والبروفيل
  const coverUpload = document.getElementById('coverUpload');
  const myCoverPhoto = document.getElementById('myCoverPhoto');
  if (coverUpload) {
    coverUpload.addEventListener('change', e => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = ev => { myCoverPhoto.style.backgroundImage = `url(${ev.target.result})`; };
        reader.readAsDataURL(file);
      }
    });
  }
  const avatarUpload = document.getElementById('avatarUpload');
  const myProfileAvatar = document.getElementById('myProfileAvatar');
  if (avatarUpload) {
    avatarUpload.addEventListener('change', e => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = ev => { myProfileAvatar.src = ev.target.result; };
        reader.readAsDataURL(file);
      }
    });
  }

  function updateAvatarBorder(borderStyle) {
    myProfileAvatar.style.border = borderStyle;
  }
  function saveBorderSelection() {
    alert('تم حفظ الإطار');
  }

  // باقي الوظائف الاختيارية (للتجربة)
  document.getElementById('emojiBtn')?.addEventListener('click', () => {
    const picker = document.getElementById('emojiPicker');
    if (picker) picker.classList.toggle('hidden');
  });
</script>
<script src="chat.js"></script>
</body>
</html>
